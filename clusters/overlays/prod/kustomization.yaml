apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base

namespace: prod-cluster

labels:
- pairs:
    environment: prod
  includeSelectors: false

patches:
# ClusterDeployment — us-west-2 for prod
- target:
    kind: ClusterDeployment
  patch: |-
    - op: replace
      path: /metadata/name
      value: prod-cluster
    - op: replace
      path: /spec/clusterName
      value: prod-cluster
    - op: replace
      path: /spec/baseDomain
      value: sandbox1993.opentlc.com
    - op: replace
      path: /spec/platform/aws/region
      value: us-west-2

# SealedSecret
- target:
    kind: SealedSecret
  patch: |-
    - op: replace
      path: /metadata/namespace
      value: prod-cluster		


# MachinePool — larger instances, autoscaling
- target:
    kind: MachinePool
  patch: |-
    - op: replace
      path: /metadata/name
      value: prod-cluster-worker
    - op: replace
      path: /spec/clusterDeploymentRef/name
      value: prod-cluster
    - op: replace
      path: /spec/platform/aws/type
      value: m5.2xlarge
    - op: add
      path: /spec/autoscaling
      value:
        minReplicas: 3
        maxReplicas: 8

# ManagedCluster — prod labels, PCI compliant
- target:
    kind: ManagedCluster
  patch: |-
    - op: replace
      path: /metadata/name
      value: prod-cluster
    - op: replace
      path: /metadata/labels/environment
      value: prod
    - op: replace
      path: /metadata/labels/region
      value: us-west-2
    - op: replace
      path: /metadata/labels/name
      value: prod-cluster
    - op: add
      path: /metadata/labels/pci-compliant
      value: "true"

# KlusterletAddonConfig
- target:
    kind: KlusterletAddonConfig
  patch: |-
    - op: replace
      path: /metadata/name
      value: prod-cluster
    - op: replace
      path: /spec/clusterName
      value: prod-cluster
    - op: replace
      path: /spec/clusterNamespace
      value: prod-cluster

# install-config Secret — larger instances, us-west-2
- target:
    kind: Secret
    name: install-config
  patch: |-
    - op: replace
      path: /stringData/install-config.yaml
      value: |
        apiVersion: v1
        metadata:
          name: prod-cluster
        baseDomain: sandbox1993.opentlc.com
        controlPlane:
          name: master
          replicas: 3
          platform:
            aws:
              type: m5.4xlarge
        compute:
        - name: worker
          platform:
            aws:
              type: m5.2xlarge
        networking:
          networkType: OVNKubernetes
          clusterNetwork:
          - cidr: 10.128.0.0/14
            hostPrefix: 23
          serviceNetwork:
          - 172.30.0.0/16
        platform:
          aws:
            region: us-west-2
        pullSecret: '{"auths":{"cloud.openshift.com":{"auth":"***REMOVED***","email":"pjalili@redhat.com"},"quay.io":{"auth":"***REMOVED***","email":"pjalili@redhat.com"},"registry.connect.redhat.com":{"auth":"***REMOVED***","email":"pjalili@redhat.com"},"registry.redhat.io":{"auth":"***REMOVED***","email":"pjalili@redhat.com"}}}'
        sshKey: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGcZTiqF3iAN9ktPGQfK3iv5U99nvUZU490X5ds66CD3 pjalili@pjalili-mac'
