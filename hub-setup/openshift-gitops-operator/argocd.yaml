apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
spec:
  server:
    route:
      enabled: true
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
  applicationSet: {}
  resourceTrackingMethod: annotation
  rbac:
    policy: |
      g, cluster-admins, role:admin
  resourceCustomizations: |
    hive.openshift.io/ClusterDeployment:
      health.lua: |
        hs = {}
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for _, condition in ipairs(obj.status.conditions) do
              if condition.type == "Provisioned" and condition.status == "True" then
                hs.status = "Healthy"
                hs.message = "Cluster is provisioned"
                return hs
              end
              if condition.type == "ProvisionFailed" and condition.status == "True" then
                hs.status = "Degraded"
                hs.message = condition.message
                return hs
              end
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Cluster provisioning in progress"
        return hs
    cluster.open-cluster-management.io/ManagedCluster:
      health.lua: |
        hs = {}
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for _, condition in ipairs(obj.status.conditions) do
              if condition.type == "ManagedClusterConditionAvailable" and condition.status == "True" then
                hs.status = "Healthy"
                hs.message = "Cluster is available"
                return hs
              end
              if condition.type == "ManagedClusterConditionAvailable" and condition.status == "False" then
                hs.status = "Degraded"
                hs.message = condition.message
                return hs
              end
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for cluster to become available"
        return hs
  controller:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
  repo:
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
