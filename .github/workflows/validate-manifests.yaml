name: Validate Manifests

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Install kube-linter
        run: |
          curl -L -o kube-linter https://github.com/stackrox/kube-linter/releases/download/v0.7.1/kube-linter-linux
          chmod +x kube-linter
          sudo mv kube-linter /usr/local/bin/

      - name: Validate cluster overlays
        run: |
          for overlay in clusters/overlays/*/; do
            echo "Building $overlay..."
            kustomize build "$overlay" > /tmp/rendered.yaml
            echo "Linting $overlay..."
            kube-linter lint /tmp/rendered.yaml || true
          done

      - name: Validate day2 configs
        run: |
          for config in day2-config/*/; do
            echo "Building $config..."
            kustomize build "$config" > /tmp/rendered.yaml
            echo "Linting $config..."
            kube-linter lint /tmp/rendered.yaml || true
          done

      - name: Validate applicationsets
        run: |
          echo "Building applicationsets..."
          kustomize build applicationsets
