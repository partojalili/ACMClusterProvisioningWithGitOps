apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: day2-network-policies-placement   # must match the label value in the ApplicationSet
  namespace: openshift-gitops
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: vendor
              operator: In
              values:
                - OpenShift
